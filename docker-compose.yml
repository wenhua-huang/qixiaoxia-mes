version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: qxx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: qxx123456
      MYSQL_DATABASE: mes
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d  # 自动执行初始化SQL
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
      --skip-character-set-client-handshake
      --collation-server=utf8mb4_general_ci
      --default-time-zone=+08:00
      --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: qxx-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./docker-data/redis:/data
    command: redis-server --requirepass qxx123456 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: qxx-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9010:9000"   # API
      - "9011:9001"   # Console
    volumes:
      - ./docker-data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
